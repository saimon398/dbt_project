name: "CD: DBT Production Workflow"
on:
  push:
    branches: [main]
  workflow_dispatch:
  
permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DBT_ENV_SECRET_PROD_NAME: ${{ secrets.DBT_PROD_DB_NAME }}
      DBT_ENV_SECRET_PROD_HOST: ${{ secrets.DBT_PROD_DB_HOST }}
      DBT_ENV_SECRET_PROD_PASS: ${{ secrets.DBT_PROD_DB_PASS }}
      DBT_ENV_SECRET_PROD_USER: ${{ secrets.DBT_PROD_DB_USER }}

    steps:
      - name: checkout repository code
        uses: actions/checkout@v5

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: install dependencies
        run: uv sync --locked

      - name: prepare connection profile
        run: cp profiles.example.yml profiles.yml

      - name: install dbt packages
        run: uv run dbt deps

      - name: build dbt models
        run: uv run dbt build --target prod

      - name: generate dbt docs
        run: uv run dbt docs generate --target prod

      - name: prepare site
        run: |
          mkdir data_catalog
          cp target/index.html data_catalog/
          cp target/manifest.json data_catalog/
          cp target/catalog.json data_catalog/
      
      - name: upload docs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: data_catalog/
          if-no-files-found: error
          retention-days: 5

      - name: upload dbt target
        uses: actions/upload-artifact@v4
        with:
          name: dbt-target-prod
          path: target/
          retention-days: 14

  publish-docs:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
  
    steps:
      - name: download docs artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: data_catalog/

      - name: publish data catalog
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data_catalog
          publish_branch: data_catalog_branch

