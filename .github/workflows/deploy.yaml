name: DBT Project Workflow
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: checkout repository code
        uses: actions/checkout@v5

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: install dependencies
        run: uv sync --locked

      - name: prepare connection profile
        run: cp profiles.example.yml profiles.yml

      - name: generate dbt docs
        run: dbt docs generate
        env:
          DBT_ENV_SECRET_NAME: ${{ secrets.DB_NAME }}
          DBT_ENV_SECRET_HOST: ${{ secrets.DB_HOST }}
          DBT_ENV_SECRET_PASS: ${{ secrets.DB_PASS }}
          DBT_ENV_SECRET_USER: ${{ secrets.DB_USER }}


