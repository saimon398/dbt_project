name: "CI: PR Validation Workflow"

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - '**.md'

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DBT_ENV_SECRET_NAME: ${{ secrets.DB_NAME }}
      DBT_ENV_SECRET_HOST: ${{ secrets.DB_HOST }}
      DBT_ENV_SECRET_PASS: ${{ secrets.DB_PASS }}
      DBT_ENV_SECRET_USER: ${{ secrets.DB_USER }}
      DBT_SCHEMA: dbt_ci_pr_${{ github.event.pull_request.number }}

    steps:
      - name: checkout repo
        uses: actions/checkout@v5
      
      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: install dependencies
        run: uv sync --locked
      
      - name: prepare connection profile
        run: cp profiles.example.yml profiles.yml

      - name: install dbt packages
        run: uv run dbt deps

      - name: download baseline artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download \
            --repo ${{ github.repository }} \
            --name dbt-target-prod \
            --dir baseline/ \
            $(gh run list \
              --repo ${{ github.repository }} \
              --workflow cd.yaml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId'
            )

      - name: build dbt modified models
        run: |
          uv run dbt build \
            --select state:modified+ \
            --target dev \
            --state ./baseline \
            --defer \
            --full-refresh

      - name: lint dbt models
        run: uv run sqlfluff lint --format github-annotation-native models/
        continue-on-error: true
