dbt_project:
  outputs:
    dev:
      dbname: "{{ env_var('DBT_ENV_SECRET_NAME') }}"
      host: "{{ env_var('DBT_ENV_SECRET_HOST') }}"
      pass: "{{ env_var('DBT_ENV_SECRET_PASS') }}"
      port: 6432
      schema: dbt_objects
      threads: 4
      type: postgres
      user: "{{ env_var('DBT_ENV_SECRET_USER') }}"
  target: dev
