version: 2

models:
  - name: songs_aggregation
    description: "{{ doc('songs_aggregation') }}"
    data_tests:
      - unique_key:
          arguments:
            column_names: [
              'primary_genre', 
              'songs_count', 
              'artist', 
              'most_popular_song_title', 
              'total_streams_billions', 
              'updated_at'
            ]
    columns:
      - name: primary_genre
        description: Жанр
        data_type: varchar(100)
      - name: songs_count
        description: Количество песен
        data_type: smallint
      - name: artist
        description: Исполнитель
        data_type: varchar(100)
      - name: most_popular_song_title
        description: Название самой прослушиваемой песни в жанре
        data_type: varchar(100)
      - name: total_streams_billions
        description: Количество прослушиваний
        data_type: numeric(10, 2)
      - name: updated_at
        description: Дата и время обновления строки
        data_type: timestamp