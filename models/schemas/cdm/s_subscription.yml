version: 2

models:
  - name: s_subscription
    description: "{{ doc('s_subscription') }}"
    config:
      materialized: scd_materialization
      hub_hash_key: 'subscription_id'
      on_schema_change: fail
      contract:
        enforced: true
    data_tests:
      - unique_key:
          arguments: 
            column_names: ['subscription_id', 'mt_valid_from_dttm']
          severity: warn
      - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
          column_A: mt_valid_to_dttm
          column_B: mt_valid_from_dttm
          or_equal: True
    columns:
      - name: subscription_id
        description: Суррогатный ключ подписки (MD5 от crm_subscription_id источника)
        data_type: varchar
        data_tests:
          - not_null
          - duplicates_active_rows_check
          - relationships:
              arguments:
                to: ref('h_subscription')
                field: subscription_id
              config:
                where: 'mt_deleted_flg = false'
      - name: subscription_type
        description: Тип подписки
        data_type: varchar
      - name: started_at
        description: Дата и время начала действия подписки
        data_type: timestamptz
      - name: mt_hash_diff
        description: Хэш атрибутов записи для отслеживания изменений
        data_type: varchar
      - name: mt_valid_from_dttm
        description: Дата начала актуальности записи
        data_type: timestamptz
      - name: mt_valid_to_dttm
        description: Дата окончания актуальности записи
        data_type: timestamptz
      - name: mt_load_dttm
        description: Дата загрузки
        data_type: timestamptz
      - name: mt_active_flg
        description: Признак актуальности записи
        data_type: boolean
      - name: mt_deleted_flg
        description: Признак удалённой записи
        data_type: boolean
      - name: mt_src_id
        description: Название источника
        data_type: varchar
