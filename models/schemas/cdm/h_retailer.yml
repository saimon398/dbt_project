version: 2

models:
  - name: h_retailer
    description: "{{ doc('h_retailer') }}"
    config:
      materialized: incremental
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: retailer_id
        description: ID ритейлера
        data_type: varchar
        data_tests:
          - unique
          - not_null
      - name: retailer_src_id
        description: ID ритейлера из источника
        data_type: varchar
      - name: mt_src_id
        description: Название источника
        data_type: varchar
      - name: mt_load_dttm
        description: Дата загрузки
        data_type: timestamptz
