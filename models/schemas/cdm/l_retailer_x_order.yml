version: 2

models:
  - name: l_retailer_x_order
    description: "{{ doc('l_retailer_x_order') }}"
    config:
      materialized: incremental
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: link_id
        description: Суррогатный ключ связи ритейлера и заказа
        data_type: varchar
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: ID заказа
        data_type: varchar
      - name: retailer_id
        description: ID ритейлера
        data_type: varchar
      - name: mt_src_id
        description: Название источника
        data_type: varchar
      - name: mt_load_dttm
        description: Дата загрузки
        data_type: timestamptz
