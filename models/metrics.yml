semantic_models:

  # --- Семантическая модель событий ---
  - name: 'events'
    description: 'Таблица фактов событий пользователей'
    model: "ref('vw_events')"

    # --- Сущности ---
    entities:

      - name: 'event'
        type: 'primary'
        expr: 'event_id'
      
      - name: 'user'
        type: 'foreign'
        expr: 'user_id'

    # --- Размерности/Измерения ---
    dimensions:

      - name: 'event_type'
        type: 'categorical'

      - name: 'event_dt'
        type: 'time'
        expr: 'date(event_dttm)'
        type_params:
          time_granularity: 'day'

    defaults:
      agg_time_dimension: 'event_dt'

    # --- Показатели/Меры ---
    measures:

      - name: 'total_events_count'
        description: 'Количество уникальных событий'
        expr: '1'
        agg: 'sum'
        create_metric: True


  # --- Семантическая модель пользователей --- 
  - name: 'users'
    description: 'Таблица-хаб пользователей сервиса'
    model: "ref('vw_users')"

    # --- Сущности ---
    entities:
      - name: 'user'
        type: 'primary'
        expr: 'id'

    # --- Размерности/измерения ---
    dimensions:
      - name: 'first_name'
        type: 'categorical'

      - name: 'last_name'
        type: 'categorical'
      
      - name: 'gender'
        type: 'categorical'

      - name: 'actual_dt'
        type: 'time'
        expr: 'date(now())'
        type_params:
          time_granularity: 'day'

    defaults:
      agg_time_dimension: 'actual_dt'

    # --- Показатели/Меры ---
    measures:
      - name: 'total_users_count'
        description: 'Количество уникальных пользователей'
        expr: '1'
        agg: 'sum'
        create_metric: True


  # --- Семантическая модель справочника самокатов ---
  - name: 'scooters'
    description: 'Таблица-справочник самокатов, составляющих парк компании'
    model: "ref('scooters')"

    # --- Сущности ---
    entities:
      - name: 'scooter'
        type: 'primary'
        expr: 'hardware_id'

    # --- Размерности ---
    dimensions:
      - name: 'company'
        type: 'categorical'

      - name: 'model'
        type: 'categorical'

      - name: 'actual_dt'
        type: 'time'
        expr: 'date(now())'
        type_params:
          time_granularity: 'day'

    defaults:
      agg_time_dimension: 'actual_dt'

    # --- Показатели ---
    measures:
      - name: 'scooters_count'
        description: 'Количество скутеров в парке'
        expr: 'scooters'
        agg: 'sum'
        create_metric: True

      - name: 'models_unique_count'
        description: 'Количество уникальных моделей скутеров'
        expr: 'model'
        agg: 'count_distinct'
        create_metric: True

      - name: 'companies_unique_count'
        description: 'Количество уникальных производителей скутеров'
        expr: 'company'
        agg: 'count_distinct'
        create_metric: True

  # --- Семантическая модель поездок на самокатах ---
  - name: 'trips_x_users_metrics'
    description: 'Таблица фактов по поездками с данными о пользователях, которые совершали поездки'
    model: "ref('trips_x_users')"

    # --- Бизнес-сущности данной таблицы ---
    entities:

      - name: 'trip'
        type: 'primary'
        expr: 'id'

      - name: 'user'
        type: 'foreign'
        expr: 'user_id'

      - name: 'scooter'
        type: 'foreign'
        expr: 'scooter_hw_id'

    # --- Измерения/размерности ---
    dimensions:

      - name: 'gender'
        type: 'categorical'
        expr: 'sex'

      - name: 'age'
        type: 'categorical'
        expr: 'age'

      - name: 'is_free'
        type: 'categorical'
        expr: 'is_free'

      - name: 'started_dt'
        type: 'time'
        expr: 'date(started_at)'
        type_params:
          time_granularity: 'day'

      - name: 'finished_dt'
        type: 'time'
        expr: 'date(finished_at)'
        type_params:
          time_granularity: 'day'

    defaults:
      agg_time_dimension: "started_dt"

    # --- Меры/ Показатели ---
    measures:
      - name: 'revenue_total'
        description: 'Общая выручка (в рублях)'
        agg: 'sum'
        expr: 'price_rub'
        create_metric: True

      - name: 'trips_count'
        description: 'Общее количество поездок'
        expr: '1'
        agg: 'sum'
        create_metric: True

      - name: 'unique_users_count'
        description: 'Количество уникальных пользователей'
        expr: 'user_id'
        agg: 'count_distinct'
        create_metric: True

      - name: 'revenue_average'
        description: 'Средняя выручка (в рублях)'
        expr: 'price_rub'
        agg: 'average'
        # здесь не создаем метрику - есть бесплатные поездки
        # которые будут искажать среднее

      - name: 'free_trips_count'
        description: 'Количество бесплатных поездок'
        expr: 'is_free'
        agg: 'sum_boolean'
        create_metric: True

      - name: 'duration_median'
        description: 'Медианная длительность поездки (в минутах)'
        expr: 'duration_s / 60.0'
        agg: 'median'
        create_metric: True

    # --- Метрики ---
    # 5 из 6 показателей выше уже будут преобразованы в простые метрики
metrics:
  - name: 'revenue_average'
    label: 'Average Revenue'
    description: 'Средняя выручка (в рублях)'
    type: 'simple'
    type_params:
      measure:
        name: 'revenue_average'
    filter: "{{ Dimension('trip__is_free') }} = false"

  - name: 'revenue_cumsum_total'
    label: 'Cummulative Total Revenue'
    description: 'Куммулятивная общая выручка (в рублях)'
    type: 'cumulative'
    type_params:
      measure:
        name: 'revenue_total'
    filter: "{{ Dimension('trip__is_free') }} = false"

  - name: 'unique_users_count_mom'
    label: 'Unique Users Count Month Over Month'
    description: 'Прирост пользователей MoM (%)'
    type: 'derived'
    type_params:
      expr: "(unique_users_count - unique_users_count_prev) * 100.0 / unique_users_count_prev"
      metrics:
       - name: 'unique_users_count'
       - name: 'unique_users_count'
         offset_window: '1 month'
         alias: 'unique_users_count_prev'

  - name: 'trips_per_scooter_ratio'
    label: 'Trips Per Scooter'
    description: 'Какое количество поездок пришлось на 1 скутер из парка'
    type: 'ratio'
    type_params:
      numerator: 'trips_count'
      denominator: 'scooters_count'

  - name: 'events_per_trip'
    label: 'Events Per Trip'
    description: 'Какое количество событий пришлось на 1 поездку пользователя'
    type: 'ratio'
    type_params:
      numerator: 'total_events_count'
      denominator: 'trips_count'


